<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="theme-toggle">
            <button id="theme-button">🌙</button>
        </div>
        <h1>Lotto Number Generator</h1>
        <div id="lotto-balls-container"></div>
        <div class="button-group">
            <button id="generate-button">Generate Numbers</button>
            <button id="recommend-button">Recommend 5 Sets</button>
        </div>
        <div id="recommend-container"></div>
        <hr class="divider">
        <section class="partnership-section">
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/mojkeayz" method="POST" id="partnership-form">
                <div class="form-group">
                    <label for="name">성함/업체명</label>
                    <input type="text" id="name" name="name" required placeholder="성함 또는 업체명을 입력해주세요">
                </div>
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" name="_replyto" required placeholder="contact@example.com">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" required placeholder="제휴 관련 문의 내용을 입력해주세요" rows="4"></textarea>
                </div>
                <button type="submit" id="submit-button">문의 보내기</button>
            </form>
            <div id="form-status"></div>
        </section>
        <hr class="divider">
        <section class="comments-section">
            <div id="disqus_thread"></div>
            <script>
                /**
                *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
                *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
                /*
                var disqus_config = function () {
                this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
                this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
                };
                */
                (function() { // DON'T EDIT BELOW THIS LINE
                var d = document, s = d.createElement('script');
                s.src = 'https://productbuilder-lglnfsquis.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </section>
    </div>
    <script src="main.js"></script>
</body>
</html>
